<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrabIt — Gesture Image Sharing</title>
    <meta name="description" content="Share images across devices with hand gestures.">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <video class="input_video" style="display:none;"></video>
        <canvas class="output_canvas" style="display:none;" width="640" height="480"></canvas>

        <div id="roomSelection" class="room-selection-overlay">
            <div class="room-card">
                <h2>GrabIt</h2>
                <p>Share images across devices with a simple code.</p>
                <div class="room-actions">
                    <button id="createRoomBtn" class="action-btn">Create New Session</button>
                    <div class="divider"><span>OR</span></div>
                    <div class="join-form">
                        <input type="text" id="roomCodeInput" maxlength="5" placeholder="Enter code">
                        <button id="joinRoomBtn" class="action-btn">Join</button>
                    </div>
                </div>
                <p id="roomError" class="error-text"></p>
            </div>
        </div>

        <header class="header" id="mainHeader" style="display: none;">
            <div class="header-top">
                <div>
                    <h1>GrabIt</h1>
                    <p class="header-subtitle">
                        <span class="status-indicator"></span>
                        Connected
                    </p>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>

            <div class="room-info">
                <span>Room: <strong id="currentRoomCodeDisplay">-----</strong></span>
                <button id="leaveRoomBtn" class="leave-btn">Leave</button>
            </div>

            <div class="mode-toggle" id="modeToggle">
                <button class="mode-toggle-btn active" data-mode="share">Share</button>
                <button class="mode-toggle-btn" data-mode="receive">Receive</button>
            </div>
        </header>

        <main class="main-content" id="mainApp" style="display: none;">
            <div class="image-card" id="imageArea">
                <div class="upload-prompt" id="uploadPrompt">
                    <svg class="upload-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <label for="fileInput" class="upload-btn">Upload new picture</label>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    <p class="instruction-text" id="shareInstruction">Close your hand to grab and send</p>
                </div>

                <div class="drop-zone" id="dropZone" style="display: none;">
                    <svg class="drop-zone-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <p class="drop-zone-text">Throw your image here</p>
                    <p class="drop-zone-subtext">Drag & drop an image or open your hand to receive</p>
                </div>

                <div id="imageContainer" style="display: none;">
                    <img id="sharedImage" src="" alt="Shared Image">
                    <button class="download-btn" id="downloadBtn" style="display: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download
                    </button>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-pill">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/>
                        <path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/>
                        <path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
                        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 13"/>
                    </svg>
                    <span id="gestureState">Initializing…</span>
                </div>
                <div class="status-pill">
                    <span class="status-pill-dot" id="statusDot"></span>
                    <span id="sharingState">Idle</span>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
